<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK AutoFlip v7.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #020817; 
            color: #F1F5F9; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { margin-bottom: 30px; }
        h1 { font-size: 28px; margin-bottom: 5px; }
        .subtitle { color: #64748B; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* KPIs */
        .kpi-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
            margin-bottom: 30px; 
        }
        .kpi-card { 
            background: #0F172A; 
            border: 1px solid #1E293B; 
            border-radius: 12px; 
            padding: 20px; 
            transition: transform 0.2s;
        }
        .kpi-label { font-size: 11px; color: #94A3B8; margin-bottom: 8px; font-weight: 600; }
        .kpi-value { font-size: 26px; font-weight: bold; color: #F8FAFC; }

        /* Section Principale */
        .section { 
            background: #0F172A; 
            border: 1px solid #1E293B; 
            border-radius: 12px; 
            padding: 20px; 
            overflow-x: auto;
        }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { 
            padding: 10px 20px; 
            background: #6366F1; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600;
            transition: all 0.2s;
        }
        button:hover { background: #4F46E5; transform: translateY(-1px); }
        button.secondary { background: #1E293B; }
        button.danger { background: #7F1D1D; }
        button.danger:hover { background: #B91C1C; }

        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 600px; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #1E293B; }
        th { background: #1E293B; font-size: 12px; color: #94A3B8; text-transform: uppercase; }
        .btn-del { color: #EF4444; cursor: pointer; background: none; border: none; font-size: 18px; }

        /* Modale */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center; justify-content: center;
            z-index: 100;
        }
        .modal-content {
            background: #0F172A;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #334155;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #020817;
            border: 1px solid #334155;
            color: white;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🎯 SK AutoFlip Enterprise</h1>
            <p class="subtitle">v7.0 — Analytics Dashboard</p>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-label">ANNONCES TOTALES</div>
                <div class="kpi-value" id="total">0</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">SCORES EXCELLENTS (+80)</div>
                <div class="kpi-value" id="excellent">0</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">MARGE POTENTIELLE</div>
                <div class="kpi-value" id="marge">0 €</div>
            </div>
        </div>

        <div class="section">
            <div class="btn-group">
                <button onclick="openModal()">+ Ajouter un véhicule</button>
                <button class="secondary" onclick="downloadCSV()">↓ Exporter CSV</button>
                <button class="danger" onclick="deleteAll()">🗑️ Purger</button>
            </div>
            <table id="tableBody">
                <thead>
                    <tr>
                        <th>Véhicule</th>
                        <th>Prix Achat</th>
                        <th>Kilométrage</th>
                        <th>Score</th>
                        <th>Marge Est.</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="rows"></tbody>
            </table>
            <div id="empty" style="text-align: center; padding: 60px; color: #475569;">
                Aucune donnée disponible. Commencez par ajouter un véhicule.
            </div>
        </div>
    </div>

    <!-- Modale d'ajout -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <h2 style="margin-bottom: 15px;">Nouvelle Annonce</h2>
            <input type="text" id="inTitre" placeholder="Modèle (ex: Golf 7 GTD)">
            <input type="number" id="inPrix" placeholder="Prix d'achat (€)">
            <input type="number" id="inKm" placeholder="Kilométrage">
            <input type="number" id="inRevente" placeholder="Prix de revente estimé (€)">
            <div class="btn-group" style="margin-top: 15px;">
                <button style="flex:1" onclick="submitForm()">Enregistrer</button>
                <button class="secondary" onclick="closeModal()">Annuler</button>
            </div>
        </div>
    </div>

    <script>
        let annonces = JSON.parse(localStorage.getItem("sk7_v2") || "[]");

        function openModal() { document.getElementById('addModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('addModal').style.display = 'none'; }

        function calcScore(a) {
            let score = 100;
            const prix = parseFloat(a.prix) || 0;
            const km = parseInt(a.km) || 0;
            const revente = parseFloat(a.revente) || 0;
            
            // Logique de scoring simplifiée
            if (prix > 15000) score -= 20;
            if (km > 150000) score -= 15;
            if (km > 200000) score -= 15;
            
            score = Math.max(0, Math.min(100, score));
            const marge = revente - (prix + 150); // 150€ de frais fixes estimés (nettoyage/admin)
            
            return { score, marge };
        }

        function refresh() {
            const excellentCount = annonces.filter(a => a.calc.score >= 80).length;
            const margeTotal = annonces.reduce((s, a) => s + a.calc.marge, 0);
            
            document.getElementById("total").textContent = annonces.length;
            document.getElementById("excellent").textContent = excellentCount;
            document.getElementById("marge").textContent = margeTotal.toLocaleString() + " €";
            
            const tbody = document.getElementById("rows");
            tbody.innerHTML = "";

            annonces.forEach((a, index) => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td style="font-weight: 500;"></td>
                    <td>${parseFloat(a.prix).toLocaleString()} €</td>
                    <td>${parseInt(a.km).toLocaleString()} km</td>
                    <td style="color: ${a.calc.score >= 80 ? '#10B981' : '#EF4444'}; font-weight: bold;">${a.calc.score}/100</td>
                    <td style="font-weight: 600;">${a.calc.marge.toLocaleString()} €</td>
                    <td><button class="btn-del" onclick="deleteItem(${index})">×</button></td>
                `;
                // Sécurisation du texte contre XSS
                tr.cells[0].textContent = a.titre; 
                tbody.appendChild(tr);
            });

            document.getElementById("tableBody").style.display = annonces.length ? "table" : "none";
            document.getElementById("empty").style.display = annonces.length ? "none" : "block";
            
            localStorage.setItem("sk7_v2", JSON.stringify(annonces));
        }

        function submitForm() {
            const titre = document.getElementById("inTitre").value;
            const prix = document.getElementById("inPrix").value;
            const km = document.getElementById("inKm").value || 0;
            const revente = document.getElementById("inRevente").value;

            if (!titre || !prix || !revente) {
                alert("Veuillez remplir les champs obligatoires");
                return;
            }

            let obj = { titre, prix: parseFloat(prix), km: parseInt(km), revente: parseFloat(revente) };
            obj.calc = calcScore(obj);
            
            annonces.push(obj);
            refresh();
            closeModal();
            
            // Reset champs
            document.getElementById("inTitre").value = "";
            document.getElementById("inPrix").value = "";
            document.getElementById("inKm").value = "";
            document.getElementById("inRevente").value = "";
        }

        function deleteItem(index) {
            if(confirm("Supprimer cette annonce ?")) {
                annonces.splice(index, 1);
                refresh();
            }
        }

        function deleteAll() {
            if (confirm("Voulez-vous vraiment vider toute la base de données ?")) {
                annonces = [];
                refresh();
            }
        }

        function downloadCSV() {
            if (!annonces.length) return alert("Rien à exporter");
            let csv = "Modèle;Prix Achat;KM;Score;Marge\n";
            annonces.forEach(a => {
                csv += `"${a.titre}";${a.prix};${a.km};${a.calc.score};${a.calc.marge}\n`;
            });
            const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "export_autoflip.csv";
            link.click();
        }

        // Initialisation
        refresh();
    </script>
</body>
</html>
